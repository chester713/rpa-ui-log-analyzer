<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyzing Log - RPA UI Log Analyzer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fb; min-height: 100vh; }
        .container { max-width: 980px; margin: 0 auto; padding: 24px 20px; }
        .card { width: min(680px, 92vw); background: white; border-radius: 12px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h1 { font-size: 22px; color: #1f2937; margin-bottom: 8px; }
        .sub { color: #6b7280; margin-bottom: 18px; }
        .bar { width: 100%; height: 14px; background: #e9edf3; border-radius: 999px; overflow: hidden; border: 1px solid #d8dee8; }
        .fill { height: 100%; width: 0%; background: linear-gradient(90deg, #2563eb, #60a5fa); transition: width 220ms ease; }
        .meta { margin-top: 10px; color: #6b7280; font-size: 13px; }
        .hint { margin-top: 14px; color: #6b7280; font-size: 12px; }

        .center-wrap { min-height: calc(100vh - 160px); display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="center-wrap">
            <div class="card">
                <h1>Analyzing Your Log</h1>
                <div class="sub">Please wait while we infer activities and recommend methods.</div>
                <div class="bar"><div class="fill" id="fill"></div></div>
                <div class="meta" id="meta">Starting...</div>
                <div class="hint">This page will automatically redirect to the guided workspace.</div>
            </div>
        </div>
    </div>

    <script>
        const eventColumn = {{ event_column | tojson }};
        const fill = document.getElementById('fill');
        const meta = document.getElementById('meta');

        let p = 6;
        fill.style.width = p + '%';
        meta.textContent = 'Preparing pipeline...';

        const ticker = setInterval(() => {
            p = Math.min(92, p + Math.random() * 7);
            fill.style.width = p.toFixed(0) + '%';
            if (p < 30) meta.textContent = 'Reading log and context...';
            else if (p < 60) meta.textContent = 'Inferring grouped activities...';
            else if (p < 85) meta.textContent = 'Matching patterns and methods...';
            else meta.textContent = 'Finalizing recommendations...';
        }, 280);

        fetch('/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ event_column: eventColumn })
        })
        .then(async (res) => {
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Analysis failed');
            clearInterval(ticker);
            fill.style.width = '100%';
            meta.textContent = 'Done. Redirecting to guided workspace...';
            setTimeout(() => {
                window.location.href = '/workspace/' + data.history_id;
            }, 300);
        })
        .catch((err) => {
            clearInterval(ticker);
            meta.textContent = 'Error: ' + err.message;
            alert(err.message);
            window.location.href = '/select-column';
        });
    </script>
</body>
</html>
