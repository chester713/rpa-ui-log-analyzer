<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPA UI Log Analyzer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fb; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 24px 20px; }
        h1 { color: #1f2937; margin-bottom: 10px; }
        .subtitle { color: #6b7280; margin-bottom: 40px; }
        .card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .upload-area { border: 2px dashed #ddd; border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .upload-area:hover { border-color: #2563eb; background: #f8f9ff; }
        .upload-area.dragover { border-color: #2563eb; background: #eff6ff; }
        input[type="file"] { display: none; }
        .btn { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 20px; }
        .btn:hover { background: #1d4ed8; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .nav { display: flex; gap: 20px; margin-bottom: 20px; }
        .nav a { color: #007bff; text-decoration: none; }
        .nav a:hover { text-decoration: underline; }
        .loading { display: none; text-align: center; padding: 20px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { background: #fee; color: #c00; padding: 12px; border-radius: 6px; margin-top: 20px; display: none; }

    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="/">Welcome</a>
            <a href="/upload">Upload</a>
            <a href="/history">History</a>
            <a href="/settings">Settings</a>
        </nav>

        <h1>RPA UI Log Analyzer</h1>
        <p class="subtitle">Upload your UI interaction logs and get automation method recommendations</p>
        
        <form class="card" id="uploadForm" action="/select-column" method="POST" enctype="multipart/form-data" data-detect-column-url="/detect-column">
            <div class="upload-area" id="uploadArea">
                <p>Drag & drop CSV file here or click to browse</p>
                <p style="color: #999; font-size: 14px; margin-top: 10px;">Supports CSV files with event logs</p>
                <input type="file" id="fileInput" name="file" accept=".csv" required>
            </div>
            
            <button class="btn" id="analyzeBtn" type="submit" disabled>Analyze Log</button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 15px;">Detecting event column...</p>
            </div>
            
            <div class="error" id="error"></div>
        </form>
    </div>
    
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        let selectedFile = null;
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                uploadArea.querySelector('p').textContent = `Selected: ${selectedFile.name}`;
                analyzeBtn.disabled = false;
            }
        });
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                selectedFile = e.dataTransfer.files[0];
                uploadArea.querySelector('p').textContent = `Selected: ${selectedFile.name}`;
                analyzeBtn.disabled = false;
            }
        });
        
        document.getElementById('uploadForm').addEventListener('submit', (e) => {
            if (!selectedFile) {
                e.preventDefault();
                return;
            }
            loading.style.display = 'block';
            error.style.display = 'none';
            analyzeBtn.disabled = true;
        });
    </script>
</body>
</html>
