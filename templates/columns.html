<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Event Column - RPA UI Log Analyzer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .nav { display: flex; gap: 20px; margin-bottom: 30px; }
        .nav a { color: #007bff; text-decoration: none; }
        .nav a:hover { text-decoration: underline; }
        .column-list { list-style: none; }
        .column-item { padding: 12px 16px; border: 2px solid #eee; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
        .column-item:hover { border-color: #007bff; }
        .column-item.selected { border-color: #007bff; background: #e7f0ff; }
        .column-item.recommended { border-color: #28a745; background: #e8f5e9; }
        .column-item.recommended::after { content: " (LLM Recommended)"; color: #28a745; font-size: 12px; }
        .column-name { font-weight: 600; color: #333; }
        .column-desc { font-size: 13px; color: #666; margin-top: 4px; }
        .btn { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-right: 10px; }
        .btn:hover { background: #0056b3; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #545b62; }
        .loading { text-align: center; padding: 40px; display: none; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .info { background: #e7f0ff; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .info p { color: #333; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="/">Upload</a>
            <a href="/history">History</a>
            <a href="/settings">Settings</a>
        </nav>
        
        <h1>Select Event Column</h1>
        <p class="subtitle">Choose the column containing event data (e.g., "ClickButton", "OpenBrowser")</p>
        
        <div class="info">
            <p>Events should be in verb + noun format, like <strong>ClickButton</strong>, <strong>FillForm</strong>, <strong>SelectOption</strong>.</p>
        </div>
        
        <div class="card">
            <ul class="column-list" id="columnList">
                <!-- Columns will be populated here -->
            </ul>
        </div>
        
        <div>
            <button class="btn" id="analyzeBtn" disabled>Analyze</button>
            <a href="/" class="btn btn-secondary">Cancel</a>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px;">Analyzing...</p>
        </div>
    </div>
    
    <script>
        const columnList = document.getElementById('columnList');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        let selectedColumn = null;
        let detectedColumn = null;
        
        // Populate columns from server data
        const columns = {{ columns | tojson }};
        detectedColumn = {{ detected_column | tojson }};
        
        columns.forEach(col => {
            const li = document.createElement('li');
            li.className = 'column-item' + (col === detectedColumn ? ' recommended selected' : '');
            li.dataset.column = col;
            li.innerHTML = `
                <div class="column-name">${col}</div>
                <div class="column-desc">Click to select this column</div>
            `;
            li.addEventListener('click', () => {
                document.querySelectorAll('.column-item').forEach(el => el.classList.remove('selected'));
                li.classList.add('selected');
                selectedColumn = col;
                analyzeBtn.disabled = false;
            });
            columnList.appendChild(li);
        });
        
        if (detectedColumn) {
            selectedColumn = detectedColumn;
            analyzeBtn.disabled = false;
        }
        
        analyzeBtn.addEventListener('click', async () => {
            loading.style.display = 'block';
            analyzeBtn.disabled = true;
            
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ event_column: selectedColumn })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Analysis failed');
                }
                
                window.location.href = '/results/' + data.history_id;
                
            } catch (err) {
                alert(err.message);
                loading.style.display = 'none';
                analyzeBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
