<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Event Column - RPA UI Log Analyzer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .nav { display: flex; gap: 20px; margin-bottom: 30px; }
        .nav a { color: #007bff; text-decoration: none; }
        .nav a:hover { text-decoration: underline; }
        .btn { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-right: 10px; }
        .btn:hover { background: #0056b3; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #545b62; }
        .loading { text-align: center; padding: 40px; display: none; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #007bfl; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .info { background: #e7f0ff; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .info p { color: #333; font-size: 14px; }
        .preview-table { overflow-y: auto; margin-top: 20px; border: 1px solid #ddd; border-radius: 8px; max-height: 400px; position: relative; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #eee; white-space: nowrap; }
        th { background: #f8f9fa; font-weight: 600; color: #333; cursor: pointer; position: sticky; top: 0; z-index: 1; }
        th:hover { background: #e7f0ff; }
        th.sel { background: #007bff !important; color: white !important; }
        th.rec { background: #e8f5e9; }
        th.rec::after { content: " (LLM)"; color: #28a745; font-size: 11px; }
        tr:hover { background: #f8f9fa; }
        .filename { font-weight: 600; color: #333; margin-bottom: 10px; }
        .selected-info { margin-top: 15px; padding: 12px; background: #e7f0ff; border-radius: 6px; }
        .button-bar { position: sticky; bottom: 0; background: white; padding: 20px 0; margin-top: 20px; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="/">Upload</a>
            <a href="/history">History</a>
            <a href="/settings">Settings</a>
        </nav>
        
        <h1>Select Event Column</h1>
        <p class="subtitle">Click on a column header to select it</p>
        
        <div class="info">
            <p>Click on a column header to select it. Events should be in verb+noun format.</p>
        </div>
        
        <div class="card">
            <p class="filename">File: {{ filename }}</p>
            <p style="color: #666; font-size: 13px;">Click a column header</p>
            
            <div class="preview-table">
                <table id="tbl">
                    <thead>
                        <tr id="hdr">
                        </tr>
                    </thead>
                    <tbody id="bdy">
                    </tbody>
                </table>
            </div>
            
            <div class="selected-info">
                <strong>Selected:</strong> <span id="selCol">{{ detected_column }}</span>
            </div>
        </div>
        
        <div class="button-bar">
            <button class="btn" id="btnAnalyze">Analyze</button>
            <a href="/" class="btn btn-secondary">Cancel</a>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px;">Analyzing...</p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        var cols = {{ columns | tojson }};
        var rows = {{ rows | tojson }};
        var defCol = "{{ detected_column }}";
        var selCol = defCol;
        
        // Build header
        var hdr = document.getElementById('hdr');
        for (var i = 0; i < cols.length; i++) {
            var th = document.createElement('th');
            th.innerText = cols[i];
            th.style.cursor = 'pointer';
            if (cols[i] === defCol) {
                th.className = 'rec sel';
            }
            (function(idx) {
                th.onclick = function() {
                    selCol = cols[idx];
                    var h = document.getElementById('hdr');
                    for (var j = 0; j < h.cells.length; j++) {
                        h.cells[j].className = (j === idx) ? 'sel' : (h.cells[j].innerText === defCol ? 'rec' : '');
                    }
                    document.getElementById('selCol').innerText = selCol;
                };
            })(i);
            hdr.appendChild(th);
        }
        
        // Build rows
        var bdy = document.getElementById('bdy');
        for (var r = 0; r < rows.length; r++) {
            var tr = document.createElement('tr');
            for (var c = 0; c < cols.length; c++) {
                var td = document.createElement('td');
                td.innerText = rows[r][cols[c]] || '';
                tr.appendChild(td);
            }
            bdy.appendChild(tr);
        }
        
        // Analyze button
        document.getElementById('btnAnalyze').onclick = function() {
            document.getElementById('loading').style.display = 'block';
            var x = new XMLHttpRequest();
            x.open('POST', '/analyze', true);
            x.setRequestHeader('Content-Type', 'application/json');
            x.onload = function() {
                document.getElementById('loading').style.display = 'none';
                if (x.status === 200) {
                    var d = JSON.parse(x.responseText);
                    window.location.href = '/results/' + d.history_id;
                } else {
                    alert(JSON.parse(x.responseText).error || 'Error');
                }
            };
            x.send(JSON.stringify({ event_column: selCol }));
        };
    </script>
</body>
</html>
